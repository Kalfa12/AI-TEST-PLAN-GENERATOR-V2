name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # 1. Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    # Advisory: src/ is frozen and has pre-existing violations.
    # Violations are reported but do not block the pipeline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-lint-

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src tests

  # ---------------------------------------------------------------------------
  # 2. Type check
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    # Advisory: src/ is frozen and has pre-existing type errors
    # (warn_unused_ignores=true in pyproject.toml flags existing noqa comments).
    # Violations are reported but do not block the pipeline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-typecheck-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-typecheck-

      - name: Install package and dev deps
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy --strict src

  # ---------------------------------------------------------------------------
  # 3. Tests with coverage
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-test-

      - name: Install package and dev deps
        run: pip install -e ".[dev]"

      - name: Install pytest-cov
        run: pip install pytest-cov

      - name: Run tests
        run: pytest --cov=src --cov-fail-under=75 -q

  # ---------------------------------------------------------------------------
  # 4. Frontend build
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  # ---------------------------------------------------------------------------
  # 5. Build Docker image (push to GHCR on main only)
  # ---------------------------------------------------------------------------
  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: [test, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/aitpg-api:latest
            ghcr.io/${{ github.repository_owner }}/aitpg-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 6. Helm lint
  # ---------------------------------------------------------------------------
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      - name: Lint Helm chart
        run: helm lint ops/helm/aitpg
