version: "3.9"

services:
  # ── AI Test Plan Generator API ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testplan-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override memory backends when companion services are enabled.
      - SEMANTIC_MEMORY_BACKEND=${SEMANTIC_MEMORY_BACKEND:-inmemory}
      - EPISODIC_MEMORY_BACKEND=${EPISODIC_MEMORY_BACKEND:-inmemory}
      - CROSSDOC_GRAPH_BACKEND=${CROSSDOC_GRAPH_BACKEND:-networkx}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Qdrant (vector store) ── uncomment when using qdrant backend ──────
  # qdrant:
