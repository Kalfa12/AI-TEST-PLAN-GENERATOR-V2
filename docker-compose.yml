services:
  # ---------------------------------------------------------------------------
  # React frontend — nginx static server + /api and /ws reverse proxy
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "/api"
        VITE_WS_BASE_URL: "/ws"
    image: aitpg-frontend:local
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API server
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: aitpg-api:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
      NEO4J_URI: "bolt://neo4j:7687"
      SEMANTIC_MEMORY_BACKEND: "inmemory"
      EPISODIC_MEMORY_BACKEND: "sqlite"
      CROSSDOC_GRAPH_BACKEND: "networkx"
      EVENT_BROKER_BACKEND: "redis"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2)"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 5

  # ---------------------------------------------------------------------------
  # ARQ background worker (same image, different entrypoint)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: aitpg-api:local
    command: ["arq", "ai_testplan_generator.jobs.worker.WorkerSettings"]
    env_file:
      - .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
      NEO4J_URI: "bolt://neo4j:7687"
      SEMANTIC_MEMORY_BACKEND: "inmemory"
      EPISODIC_MEMORY_BACKEND: "sqlite"
      CROSSDOC_GRAPH_BACKEND: "networkx"
      EVENT_BROKER_BACKEND: "redis"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    volumes:
      - ./data:/app/data
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, sys; sys.exit(0 if any('arq ai_testplan_generator.jobs.worker.WorkerSettings' in open(f'/proc/{pid}/cmdline', 'rb').read().replace(b'\\x00', b' ').decode('utf-8', 'ignore') for pid in os.listdir('/proc') if pid.isdigit()) else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — job queue + event pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Qdrant — vector semantic store
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c",
             "printf 'GET /healthz HTTP/1.0\\r\\n\\r\\n' | nc -w2 127.0.0.1 6333 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ---------------------------------------------------------------------------
  # Neo4j — cross-document traceability graph
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:-neo4j/changeme}"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c",
             "wget -qO- http://127.0.0.1:7474 > /dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ---------------------------------------------------------------------------
  # Observability stack (opt-in via --profile observability)
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - prometheus_data:/prometheus
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_PATHS_PROVISIONING: "/etc/grafana/provisioning"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  redis_data:
  qdrant_data:
  neo4j_data:
  prometheus_data:
  grafana_data:
