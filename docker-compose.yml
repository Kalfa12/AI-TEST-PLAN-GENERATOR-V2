  #     - "6334:6334"    # gRPC
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   restart: unless-stopped

  # ── Redis (episodic store) ── uncomment when using redis backend ──────
  # redis:
  #   image: redis:7-alpine
  #   container_name: testplan-redis
  #   ports:
  #     - "6379:6379"
